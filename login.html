<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create your Vesper & Vine account. Track orders, save favorites, and join our fragrance community.">
  <title>Sign In — Vesper &amp; Vine</title>

  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Auth Page Layout -->
  <div class="auth-page">
    <!-- Image Side -->
    <div class="auth-image-side">
      <img src="images/lifestyle_living.png" alt="Vesper &amp; Vine candles in a serene living room">
      <div class="auth-image-overlay">
        <div class="auth-image-text">
          <h2>Light your daily ritual</h2>
          <p>Join our community of mindful living enthusiasts</p>
        </div>
      </div>
    </div>

    <!-- Form Side -->
    <div class="auth-form-side">
      <!-- Close Button -->
      <a href="index.html" class="auth-close-btn" onclick="if(document.referrer && document.referrer.includes(window.location.host)) { event.preventDefault(); history.back(); }" aria-label="Close authentication page">
        <i class="bi bi-x-lg"></i>
      </a>

      <div class="auth-form-container">
        <!-- Brand -->
        <div class="auth-brand">
          <a href="index.html" class="d-flex align-items-center justify-content-center" style="font-family: var(--ff-heading); font-size: 1.6rem; color: var(--clr-text); text-decoration: none; margin-bottom: 0.5rem;">
            <svg class="brand-logo-svg" viewBox="0 0 40 40" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-right: 10px;">
              <path d="M20 8C20 8 13 16 13 22C13 25.866 16.134 29 20 29C23.866 29 27 25.866 27 22C27 16 20 8 20 8Z" stroke="var(--clr-accent)" stroke-width="1.5" fill="none" />
              <path d="M14 26C17 25 21 21 24 16C27 11 28 8 28 8C28 8 24 10 20 14C16 18 15 23 14 26Z" fill="var(--clr-accent-light)" opacity="0.85" stroke="none" />
            </svg>
            <span>Vesper &amp; Vine</span>
          </a>
          <p>Welcome to your scented sanctuary</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" id="loginTab">Sign In</button>
          <button class="auth-tab" data-tab="signup" id="signupTab">Create Account</button>
        </div>

        <!-- Login Form -->
        <div class="auth-form-panel active" id="loginPanel">
          <form id="loginForm">
            <div class="form-group-vesper">
              <label for="loginEmail">Email Address</label>
              <input type="email" class="form-input-vesper" id="loginEmail" placeholder="your@email.com" required>
            </div>

            <div class="form-group-vesper">
              <label for="loginPassword">Password</label>
              <div class="password-wrapper">
                <input type="password" class="form-input-vesper" id="loginPassword" placeholder="Enter your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <label class="form-check-vesper mb-0">
                <input type="checkbox" checked> Remember me
              </label>
              <a href="#" class="form-link-vesper">Forgot password?</a>
            </div>

            <button type="submit" class="auth-submit-btn">
              <span>Sign In</span>
            </button>

            <div class="auth-divider">
              <span>or continue with</span>
            </div>

            <button type="button" class="social-auth-btn">
              <i class="bi bi-google"></i> Continue with Google
            </button>
            <button type="button" class="social-auth-btn">
              <i class="bi bi-apple"></i> Continue with Apple
            </button>
          </form>
        </div>

        <!-- Signup Form -->
        <div class="auth-form-panel" id="signupPanel">
          <form id="signupForm">
            <div class="form-row-vesper">
              <div class="form-group-vesper">
                <label for="signupFirstName">First Name</label>
                <input type="text" class="form-input-vesper" id="signupFirstName" placeholder="Flora" required>
              </div>
              <div class="form-group-vesper">
                <label for="signupLastName">Last Name</label>
                <input type="text" class="form-input-vesper" id="signupLastName" placeholder="Merrit" required>
              </div>
            </div>

            <div class="form-group-vesper">
              <label for="signupEmail">Email Address</label>
              <input type="email" class="form-input-vesper" id="signupEmail" placeholder="your@email.com" required>
            </div>

            <div class="form-group-vesper">
              <label for="signupPassword">Password</label>
              <div class="password-wrapper">
                <input type="password" class="form-input-vesper" id="signupPassword" placeholder="Min. 8 characters" required minlength="8">
                <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <div class="form-group-vesper">
              <label for="signupPasswordConfirm">Confirm Password</label>
              <div class="password-wrapper">
                <input type="password" class="form-input-vesper" id="signupPasswordConfirm" placeholder="Confirm your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('signupPasswordConfirm', this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <label class="form-check-vesper">
              <input type="checkbox" required> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>

            <button type="submit" class="auth-submit-btn">
              <span>Create Account</span>
            </button>

            <div class="auth-divider">
              <span>or continue with</span>
            </div>

            <button type="button" class="social-auth-btn">
              <i class="bi bi-google"></i> Continue with Google
            </button>
            <button type="button" class="social-auth-btn">
              <i class="bi bi-apple"></i> Continue with Apple
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap 5.3 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Tab switching
    const tabs = document.querySelectorAll('.auth-tab');
    const panels = document.querySelectorAll('.auth-form-panel');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        const targetId = tab.dataset.tab + 'Panel';
        document.getElementById(targetId).classList.add('active');
      });
    });

    // Password toggle
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    // Form submissions
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (window.location.protocol.startsWith('http')) {
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('vesperAuthToken', data.token);
            localStorage.setItem('vesperUser', JSON.stringify({
              firstName: data.user.name.split(' ')[0],
              lastName: data.user.name.split(' ').slice(1).join(' '),
              email: data.user.email,
              loggedIn: true
            }));
            window.location.href = 'profile.html';
            return;
          } else {
            alert(data.error || 'Login failed');
            return;
          }
        } catch (error) {
          console.warn('API login failed. Falling back to local demo.', error);
        }
      }

      // Local storage fallback for demo (offline/file://)
      localStorage.setItem('vesperUser', JSON.stringify({
        firstName: email.split('@')[0],
        lastName: '',
        email: email,
        loggedIn: true
      }));
      window.location.href = 'profile.html';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('signupFirstName').value;
      const lastName = document.getElementById('signupLastName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupPasswordConfirm').value;
      
      if (password !== confirm) {
        alert('Passwords do not match');
        return;
      }

      if (window.location.protocol.startsWith('http')) {
        try {
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: `${firstName} ${lastName}`, email, password })
          });
          const data = await res.json();
          if (res.ok) {
            // Auto login after registration
            const loginRes = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password })
            });
            const loginData = await loginRes.json();
            if (loginRes.ok) {
              localStorage.setItem('vesperAuthToken', loginData.token);
              localStorage.setItem('vesperUser', JSON.stringify({
                firstName,
                lastName,
                email,
                loggedIn: true
              }));
              window.location.href = 'profile.html';
              return;
            }
          } else {
            alert(data.error || 'Registration failed');
            return;
          }
        } catch (error) {
          console.warn('API register failed. Falling back to local demo.', error);
        }
      }

      // Local storage fallback for demo (offline/file://)
      localStorage.setItem('vesperUser', JSON.stringify({
        firstName,
        lastName,
        email,
        loggedIn: true
      }));
      window.location.href = 'profile.html';
    });

    // Check URL params for tab
    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'signup') {
      document.getElementById('signupTab').click();
    }
  </script>
</body>
</html>
